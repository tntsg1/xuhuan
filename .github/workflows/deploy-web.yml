name: Deploy Web Build

on:
  push:
    branches:
      - main
      - agent/current-version-2026-07-18
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Godot and export templates
        env:
          GODOT_RELEASE: 4.7-stable
          GODOT_TEMPLATE_VERSION: 4.7.stable
        run: |
          curl --fail --location --silent --show-error \
            --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_RELEASE}_linux.x86_64"

          curl --fail --location --silent --show-error \
            --output templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          unzip -q templates.tpz -d "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mv "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/templates/"* \
            "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"
          rmdir "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/templates"

      - name: Export browser build
        run: |
          mkdir -p build/web
          ./Godot_v4.7-stable_linux.x86_64 --headless --path . --export-release Web build/web/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
