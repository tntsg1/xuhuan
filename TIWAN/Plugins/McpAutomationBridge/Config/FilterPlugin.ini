[FilterPlugin]
; This section lists additional files which will be packaged along with your plugin. Paths should be listed relative to the root plugin directory, and
; may include "...", "*", and "?" wildcards to match directories, files, and individual characters respectively.
;
; Examples:
;    /README.txt
;    /Extras/...
;    /Binaries/ThirdParty/*.dll

; Fab submission includes these root-level documentation files in addition to
; the expected .uplugin, Config, Source, Content, and Resources structure.
/README.md
/CHANGELOG.md
/LICENSE
/Content/...

; Agent instructions are repository metadata, not plugin distribution files.
-/Source/.../AGENTS.md
